<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Invaders</title>
    <link rel="stylesheet" href="space.css">
    <link rel="icon" type="image/png" href="images/controllericon.png"/>
    <script src="space.js" defer></script>
</head>


<body>
    <canvas id="board" tabindex="0"></canvas> 
    
    <button id="newGameBtn">New Game</button>
    <div id="gameOverText" style="display:none;">Game Over</div>
    <!-- <div id="info">
        <p>Move with arrow keys</p> 
        <p>Fire with the space bar</p> 
    </div> -->

<audio id="backgroundMusic"></audio>
<script>
    // Array of audio tracks
    // This array holds the file paths of the audio tracks to be played.
    const audioTracks = [
        "./background-audio/Myuu-Grotesque-Fantasia.mp3", // Track 1: Grotesque Fantasia
        "./background-audio/Myuu-Obsessions.mp3",        // Track 2: Obsessions
        "./background-audio/Myuu-Countdown.mp3",         // Track 3: Countdown
        "./background-audio/Myuu-Collapse.mp3"           // Track 4: Collapse
    ];

    // Get a reference to the audio element in the HTML
    const audio = document.getElementById("backgroundMusic");

    // Boolean flag to ensure the audio starts only once after user interaction
    let hasStarted = false;

    // Function to play a random track from the audioTracks array
    function playRandomTrack() {
        // Generate a random index to select a track from the array
        const randomIndex = Math.floor(Math.random() * audioTracks.length);

        // Set the audio source to the selected track
        audio.src = audioTracks[randomIndex];

        // Attempt to play the audio; catch any errors (e.g., autoplay restrictions)
        audio.play().catch(error => {
            console.error("Audio playback failed:", error);
        });
    }

    // Event listener for when the current audio track ends
    audio.addEventListener("ended", () => {
        playRandomTrack(); // Automatically play another random track
    });

    // Event listener for user interaction (click) to start playback
    document.addEventListener("click", () => {
        // Check if the music has not already started
        if (!hasStarted) {
            hasStarted = true; // Mark as started to prevent multiple triggers
            playRandomTrack(); // Play the first random track
        }
    });
</script>

</body>

</html>
